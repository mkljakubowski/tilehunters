version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tilehunters
      POSTGRES_USER: tilehunters
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tilehunters}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tilehunters"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: mkljakubowski/tilehunters:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tilehunters
      DB_USER: tilehunters
      DB_PASSWORD: ${DB_PASSWORD:-tilehunters}
      SESSION_SECRET: ${SESSION_SECRET}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET}
      STRAVA_REDIRECT_URI: ${STRAVA_REDIRECT_URI}
      FRONTEND_URL: ${FRONTEND_URL}
      STRAVA_WHITELIST: ${STRAVA_WHITELIST:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "80:3000"

volumes:
  postgres_data:
